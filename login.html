<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - LMS</title>
  <meta name="description" content="登录 LMS 平台，访问您的在线课程和学习进度。">
  <!-- Dark mode anti-flash -->
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#EFF6FF', 100: '#DBEAFE', 200: '#BFDBFE', 300: '#93C5FD',
              400: '#60A5FA', 500: '#3B82F6', 600: '#2563EB', 700: '#1D4ED8',
              800: '#1E40AF', 900: '#1E3A8A',
            },
            secondary: '#6366F1',
          },
        },
      },
    }
  </script>
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    #page-loader{position:fixed;inset:0;z-index:9999;background:#fff;display:flex;align-items:center;justify-content:center;transition:opacity .4s,visibility .4s}
    #page-loader.dark-loader{background:#030712}
    #page-loader.hidden{opacity:0;visibility:hidden}
    .loader-spinner{width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#3B82F6;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#3B82F6,#6366F1);z-index:9998;width:0;transition:none}
    .star-filled svg{fill:currentColor}
  </style>
</head>
<body class="bg-white dark:bg-gray-950 antialiased transition-colors duration-300">

  <div id="scroll-progress"></div>

            </svg>
          </div>
          <span class="text-xl font-bold text-gray-900">LMS</span>
        </a>

        <div class="hidden md:flex items-center space-x-8">
          <a href="index.html#features" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">功能</a>
          <a href="courses.html" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">课程</a>
          <a href="enterprise.html" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">企业版</a>
          <a href="help.html" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">帮助</a>

        <div class="hidden md:flex items-center space-x-3">

            <i data-feather="moon" class="w-5 h-5 text-gray-700 dark:text-gray-300 dark:hidden"></i>
            <i data-feather="sun" class="w-5 h-5 text-gray-300 hidden dark:block"></i>
          </button>
          <a href="login.html" class="px-4 py-2 text-sm font-medium text-blue-600 dark:text-blue-400">登录</a>
          <a href="signup.html" class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 dark:bg-blue-500 rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 transition-colors shadow-sm">免费试用</a>

        <button class="mobile-menu-btn md:hidden p-2 rounded-lg hover:bg-gray-100 transition-colors" aria-label="打开菜单">

      <div class="nav-links hidden md:hidden pb-4 border-t border-gray-100 mt-2">
        <div class="flex flex-col space-y-2 pt-4">
          <a href="index.html#features" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition-colors">功能</a>
          <a href="courses.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition-colors">课程</a>
          <a href="enterprise.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition-colors">企业版</a>
          <a href="help.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition-colors">帮助</a>
          <div class="flex items-center space-x-3 pt-2 px-3">
            <button id="dark-toggle-mobile" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="切换暗色模式">
              <i data-feather="moon" class="w-5 h-5 text-gray-700 dark:text-gray-300 dark:hidden"></i>
              <i data-feather="sun" class="w-5 h-5 text-gray-300 hidden dark:block"></i>
            </button>
            <a href="login.html" class="px-4 py-2 text-sm font-medium text-blue-600 dark:text-blue-400">登录</a>
            <a href="signup.html" class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">免费试用</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-20">
    <!-- 面包屑导航 -->
    <div class="bg-gray-50 dark:bg-gray-900 py-4">
      <div class="container mx-auto px-4 lg:px-8">
        <nav class="flex items-center space-x-2 text-sm">
          <a href="index.html" class="text-gray-500 hover:text-blue-600">首页</a>
          <i data-feather="chevron-right" class="w-4 h-4 text-gray-400"></i>
          <span class="text-gray-900 dark:text-white">登录</span>
        </nav>
      </div>
    </div>

    <!-- 登录页面内容 -->
    <section class="min-h-[calc(100vh-16rem)] flex items-center justify-center py-12 px-4">
      <div class="w-full max-w-md">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">欢迎回来</h1>
          <p class="text-gray-600 dark:text-gray-400">登录您的 LMS 账号继续学习</p>
        </div>

        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-lg p-8">
          <form id="login-form" class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">邮箱地址</label>
              <input type="email" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" placeholder="your@email.com">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">密码</label>
              <input type="password" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" placeholder="••••••••">
            </div>
            <div class="flex items-center justify-between">
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">记住我</span>
              </label>
              <a href="#" class="text-sm text-blue-600 hover:text-blue-700">忘记密码？</a>
            </div>
            <button type="submit" class="w-full py-3.5 text-base font-semibold text-white bg-blue-600 dark:bg-blue-500 rounded-xl hover:bg-blue-700 dark:hover:bg-blue-600 shadow-sm transition-colors">登录</button>
          </form>

          <div class="mt-6">
            <div class="relative">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
              </div>
              <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-white dark:bg-gray-900 text-gray-500">或使用</span>
              </div>
            </div>

            <div class="mt-6 grid grid-cols-2 gap-3">
              <button class="flex items-center justify-center px-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Google</span>
              </button>
              <button class="flex items-center justify-center px-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">GitHub</span>
              </button>
            </div>
          </div>
        </div>

        <p class="text-center mt-6 text-gray-600 dark:text-gray-400">
          还没有账号？<a href="signup.html" class="text-blue-600 hover:text-blue-700 font-medium">立即注册</a>
        </p>
      </div>
    </section>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-24 right-4 z-50 transform translate-x-full opacity-0 transition-all duration-500 ease-out">
    <div class="flex items-center gap-3 px-5 py-3 bg-green-600 text-white rounded-xl shadow-xl">
      <i data-feather="check-circle" class="w-5 h-5 flex-shrink-0"></i>
      <span id="toast-message" class="text-sm font-medium">操作成功</span>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="bg-gray-900 dark:bg-gray-950 py-12">
    <div class="container mx-auto px-4 lg:px-8 text-center">
      <div class="text-2xl font-bold text-white mb-3">LMS</div>
      <p class="text-sm text-gray-400 dark:text-gray-500 mb-6">让学习更简单，让成长更高效</p>
      <div class="flex justify-center space-x-4">
        <a href="#" class="text-gray-400 hover:text-white transition-colors"><i data-feather="twitter" class="w-5 h-5"></i></a>
        <a href="#" class="text-gray-400 hover:text-white transition-colors"><i data-feather="linkedin" class="w-5 h-5"></i></a>
        <a href="#" class="text-gray-400 hover:text-white transition-colors"><i data-feather="github" class="w-5 h-5"></i></a>
      </div>
      <p class="text-xs text-gray-500 mt-8">© 2026 LMS. 保留所有权利。</p>
    </div>
  </footer>

  <script>
    // Page Loader
    const loader = document.getElementById('page-loader');
    if (document.documentElement.classList.contains('dark')) loader?.classList.add('dark-loader');
    window.addEventListener('load', () => { setTimeout(() => loader?.classList.add('hidden'), 300); });

    // Scroll Progress
    const scrollProgress = document.getElementById('scroll-progress');
    if (scrollProgress) {
      window.addEventListener('scroll', () => {
        const h = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress.style.width = (window.scrollY / h * 100) + '%';
      });
    }

    // Dark Mode Toggle
    function toggleDarkMode() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    document.getElementById('dark-toggle')?.addEventListener('click', toggleDarkMode);
    document.getElementById('dark-toggle-mobile')?.addEventListener('click', toggleDarkMode);

    // Mobile Menu
    const menuBtn = document.querySelector('.mobile-menu-btn');
    const navLinks = document.querySelector('.nav-links');
    if (menuBtn && navLinks) {
      menuBtn.addEventListener('click', () => {
        navLinks.classList.toggle('hidden');
      });
      navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => navLinks.classList.add('hidden'));
      });
    }

    // Toast
    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      if (!toast || !toastMessage) return;
      toastMessage.textContent = msg;
      toast.querySelector('div').classList.toggle('bg-green-600', !isError);
      toast.querySelector('div').classList.toggle('bg-red-600', isError);
      toast.classList.remove('translate-x-full', 'opacity-0');
      toast.classList.add('translate-x-0', 'opacity-100');
      setTimeout(() => {
        toast.classList.add('translate-x-full', 'opacity-0');
        toast.classList.remove('translate-x-0', 'opacity-100');
      }, 3000);
    }

    // Login Form
    document.getElementById('login-form')?.addEventListener('submit', e => {
      e.preventDefault();
      showToast('✅ 登录成功！正在跳转...');
    });

    // Feather Icons
    if (typeof feather !== 'undefined') feather.replace();
  </script>
</body>
</html>
